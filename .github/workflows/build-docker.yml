name: Docker Build (Server & API)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-leaderboard-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Leaderboard API Image
        uses: docker/build-push-action@v4
        with:
          context: ./leaderboard_api
          file: ./leaderboard_api/Dockerfile
          push: false
          tags: 2d-racing-game-leaderboard_api:latest
