name: Docker Build (Server & API)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'server.py'
      - 'Dockerfile'
      - 'leaderboard_api/**'
      - 'requirements.txt'
      - 'docker-compose.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'server.py'
      - 'Dockerfile'
      - 'leaderboard_api/**'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  build-leaderboard-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Leaderboard API Image
        uses: docker/build-push-action@v4
        with:
          context: ./leaderboard_api
          file: ./leaderboard_api/Dockerfile
          push: false # Do góry (np. DockerHub) narazie nie wypychamy, służy to jako test kompilacji
          tags: 2d-racing-game-leaderboard_api:latest
          
  build-legacy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Legacy Game Server Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: 2d-racing-game-server:latest
