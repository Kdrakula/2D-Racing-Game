name: C++ Client Build

on:
  push:
    branches: [ "main"]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies (brew)
      run: |
        brew install cmake sdl3 sdl3_image sdl3_ttf nlohmann-json macdylibbundler

    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Bundle Dependencies
      run: |
        mkdir -p build/MyRacingGame.app/Contents/Frameworks
        dylibbundler -f -b -x ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame -d ./build/MyRacingGame.app/Contents/Frameworks/ -p @executable_path/../Frameworks/

    - name: Verify Dependencies (Dry Run)
      run: |
        # Próba uruchomienia zablokuje się na braku bibliotek ZANIM zacznie rysować grafikę
        ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame --help || true
        
        # Automatyczne sprawdzenie otool'em
        otool -L ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame | grep -q "/opt/homebrew" && exit 1 || echo "Dependencies are clean!"

    - name: Sign App Bundle (ad-hoc)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        codesign --deep --force --sign - build/MyRacingGame.app

    - name: Package App Bundle
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        zip -r MyRacingGame-macOS.zip MyRacingGame.app

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/MyRacingGame-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
