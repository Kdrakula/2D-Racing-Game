name: C++ Client Build

on:
  push:
    branches: [ "main"]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies (brew)
      run: |
        brew install cmake sdl3 sdl3_image sdl3_ttf nlohmann-json

    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Sign App Bundle (ad-hoc)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        codesign --deep --force --sign - build/MyRacingGame.app

    - name: Package App Bundle
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        zip -r MyRacingGame-macOS.zip MyRacingGame.app

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/MyRacingGame-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
