name: C++ Client Build

on:
  push:
    branches: [ "main"]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Homebrew Cache
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build-cpp.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install dependencies (brew)
      run: |
        HOMEBREW_NO_AUTO_UPDATE=1 brew install cmake sdl3 sdl3_image sdl3_ttf nlohmann-json dylibbundler ccache

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache

    - name: FetchContent Cache
      uses: actions/cache@v4
      with:
        path: _deps
        key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/_deps

    - name: Build
      run: cmake --build build --config Release

    - name: Bundle Dependencies
      run: |
        mkdir -p build/MyRacingGame.app/Contents/Frameworks
        dylibbundler -od -b -x ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame -d ./build/MyRacingGame.app/Contents/Frameworks/ -p @executable_path/../Frameworks/

    - name: Verify Dependencies (Dry Run)
      run: |
        # Próba uruchomienia zablokuje się na braku bibliotek ZANIM zacznie rysować grafikę
        ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame --dry-run
        
        # Automatyczne sprawdzenie otool'em
        otool -L ./build/MyRacingGame.app/Contents/MacOS/MyRacingGame | grep -q "/opt/homebrew" && exit 1 || echo "Dependencies are clean!"

    - name: Sign App Bundle (ad-hoc)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        codesign --deep --force --sign - build/MyRacingGame.app

    - name: Package App Bundle
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        zip -r MyRacingGame-macOS.zip MyRacingGame.app

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/MyRacingGame-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
