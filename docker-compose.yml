services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepassword
      POSTGRES_DB: leaderboards
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  leaderboard_api:
    build: ./leaderboard_api
    container_name: leaderboard_api
    environment:
      - DATABASE_URL=postgresql://gameuser:gamepassword@db/leaderboards
    ports:
      - "4000:4000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
